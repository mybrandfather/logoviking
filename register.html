<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Logo Viking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding: calc(var(--nav-h) + 40px) 20px 60px; }
.auth-card { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:48px; width:100%; max-width:440px; position:relative; overflow:hidden; }
.auth-card::before { content:''; position:absolute; top:-100px; right:-100px; width:300px; height:300px; background:radial-gradient(circle, var(--accent-glow), transparent); pointer-events:none; }
.auth-logo { text-align:center; margin-bottom:32px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px; }
.form-group input { width:100%; padding:11px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-body); font-size:0.92rem; transition:border-color 0.2s; }
.form-group input:focus { outline:none; border-color:var(--accent); }
.form-group input::placeholder { color:var(--text2); }
.auth-divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.auth-divider span { font-size:0.78rem; color:var(--text2); }
.oauth-btn { width:100%; padding:11px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg3); color:var(--text); font-family:var(--font-body); font-size:0.9rem; cursor:pointer; margin-bottom:10px; transition:border-color 0.2s, background 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
.oauth-btn:hover { border-color:var(--accent); background:var(--bg2); }
.auth-submit { width:100%; padding:13px; border-radius:var(--radius-sm); background:var(--accent); color:#fff; border:none; font-family:var(--font-head); font-size:1rem; font-weight:700; cursor:pointer; transition:background 0.2s; margin-top:8px; }
.auth-submit:hover { background:var(--accent2); }
.auth-footer { text-align:center; margin-top:20px; font-size:0.85rem; color:var(--text2); }
.auth-footer a { color:var(--accent2); text-decoration:underline; text-underline-offset:3px; }
.plan-select { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:20px; }
.plan-opt { padding:10px 8px; border:1px solid var(--border); border-radius:8px; text-align:center; cursor:pointer; font-size:0.82rem; transition:border-color 0.2s, background 0.2s; }
.plan-opt.selected, .plan-opt:hover { border-color:var(--accent); background:rgba(124,58,237,0.08); }
.plan-opt strong { display:block; font-family:var(--font-head); font-size:0.95rem; }
.terms-check { display:flex; align-items:flex-start; gap:10px; font-size:0.82rem; color:var(--text2); margin-top:12px; }
.terms-check input { margin-top:2px; accent-color:var(--accent); }
.terms-check a { color:var(--accent2); }
</style>
</head>
<body>
<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-icon">⚔</span><span>Logo<strong>Viking</strong></span></a>
    <div class="nav-actions" style="margin-left:auto">
      <button class="theme-toggle" id="themeToggle">☀</button>
    </div>
  </div>
</nav>
<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" class="logo"><span class="logo-icon">⚔</span><span>Logo<strong>Viking</strong></span></a>
    </div>
    <h2 style="font-family:var(--font-head);font-size:1.6rem;font-weight:800;text-align:center;margin-bottom:6px">Join Logo Viking</h2>
    <p style="color:var(--text2);font-size:0.9rem;text-align:center;margin-bottom:24px">Free forever. Upgrade when you conquer more.</p>

    <button class="oauth-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 0 0 0 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or register with email</span></div>

    <div style="margin-bottom:16px">
      <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:8px">Choose your plan</label>
      <div class="plan-select" id="planSelect">
        <div class="plan-opt selected" data-plan="free"><strong>Free</strong>$0/mo</div>
        <div class="plan-opt" data-plan="pro"><strong>Pro</strong>$9/mo</div>
        <div class="plan-opt" data-plan="business"><strong>Business</strong>$29/mo</div>
      </div>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" placeholder="Jane Smith" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Min. 8 characters" autocomplete="new-password">
    </div>

    <label class="terms-check">
      <input type="checkbox" id="termsCheck">
      <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
    </label>

    <button class="auth-submit" style="margin-top:16px">Create Account →</button>
    <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</main>
<script src="app.js"></script>
<script>
document.querySelectorAll('.plan-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.plan-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });
});
// Pre-select plan from URL param
const plan = new URLSearchParams(window.location.search).get('plan');
if (plan) {
  document.querySelectorAll('.plan-opt').forEach(o => o.classList.remove('selected'));
  document.querySelector(`.plan-opt[data-plan="${plan}"]`)?.classList.add('selected');
}
</script>
</body>
</html>
